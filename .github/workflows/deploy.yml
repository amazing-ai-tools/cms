name: Deploy Static Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate production runtime configuration
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL }}
        run: |
          missing=0
          for name in GOOGLE_CLIENT_ID GOOGLE_CALLBACK_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for production Google sign-in"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate Azure CDN origin configuration
        if: ${{ vars.AZURE_CDN_STORAGE_ACCOUNT != '' }}
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_CDN_RESOURCE_GROUP: ${{ vars.AZURE_CDN_RESOURCE_GROUP }}
          AZURE_CDN_STORAGE_ACCOUNT: ${{ vars.AZURE_CDN_STORAGE_ACCOUNT }}
        run: |
          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_CDN_RESOURCE_GROUP AZURE_CDN_STORAGE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required when AZURE_CDN_STORAGE_ACCOUNT is set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Log in to Azure
        if: ${{ vars.AZURE_CDN_STORAGE_ACCOUNT != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Provision Azure CDN origin
        if: ${{ vars.AZURE_CDN_STORAGE_ACCOUNT != '' }}
        run: ./infra/provision-azure-cdn-storage.sh
        env:
          LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
          RESOURCE_GROUP_NAME: ${{ vars.AZURE_CDN_RESOURCE_GROUP }}
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_CDN_STORAGE_ACCOUNT }}
          DEPLOYMENT_NAME: ${{ vars.AZURE_CDN_DEPLOYMENT_NAME || 'cms-cdn-storage' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_APP_NAME: ${{ vars.APP_DISPLAY_NAME }}
          VITE_APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          VITE_BUGZERO_APP_KEY: ${{ vars.BUGZERO_APP_KEY }}
          VITE_BUGZERO_WIDGET_URL: ${{ vars.BUGZERO_WIDGET_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL }}
          VITE_GENERATION_API_URL: ${{ vars.VITE_GENERATION_API_URL }}
          VITE_AI_SETTINGS_API_BASE_URL: ${{ vars.VITE_AI_SETTINGS_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        if: ${{ vars.HOSTING_PROVIDER == '' || vars.HOSTING_PROVIDER == 'azure_static_web_app' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true

      - name: Deploy to Cloudflare Pages
        if: ${{ vars.HOSTING_PROVIDER == 'cloudflare_pages' }}
        run: npx --yes wrangler@latest pages deploy dist --project-name "${{ vars.CLOUDFLARE_PROJECT_NAME }}" --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload build to Azure CDN origin
        if: ${{ vars.AZURE_CDN_STORAGE_ACCOUNT != '' }}
        run: ./infra/upload-azure-static-site.sh dist
        env:
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_CDN_STORAGE_ACCOUNT }}
